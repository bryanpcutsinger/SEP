<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.6;
            color: #333;
            background: #fafafa;
        }
        header {
            border-bottom: 2px solid #333;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0 0 0.25rem 0;
            font-size: 1.8rem;
        }
        .date {
            color: #666;
            font-size: 0.95rem;
        }
        .body-content {
            margin-bottom: 2rem;
        }
        .chart {
            text-align: center;
            margin: 2rem 0;
        }
        .chart img {
            max-width: 100%;
            height: auto;
        }
        .chart-caption {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: right;
        }
        th {
            background: #f0f0f0;
            text-align: center;
        }
        td:first-child, th:first-child {
            text-align: left;
        }
        footer {
            border-top: 1px solid #ccc;
            padding-top: 1rem;
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
        <div class="date">{{ date }}</div>
    </header>

    <div class="body-content">
        {{ body }}
    </div>

    {% for chart in charts %}
    <div class="chart">
        <img src="data:image/png;base64,{{ chart.data }}" alt="{{ chart.caption }}">
        <div class="chart-caption">{{ chart.caption }}</div>
    </div>
    {% endfor %}

    {% for table in tables %}
    <div class="table-container">
        {{ table }}
    </div>
    {% endfor %}

    <footer>
        <p>Source: Federal Reserve Board, Summary of Economic Projections</p>
        <p>Generated from <a href="https://github.com/bryanpcutsinger/SEP">bryanpcutsinger/SEP</a></p>
    </footer>
</body>
</html>
